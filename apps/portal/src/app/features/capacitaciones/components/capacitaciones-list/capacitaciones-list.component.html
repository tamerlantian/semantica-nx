<div class="page-container">
  <app-page-header title="Capacitaciones" subtitle="Historial de capacitaciones del empleado" />

  @if (loading() && capacitaciones().length === 0) {
    <app-loading-spinner message="Cargando capacitaciones..." />
  } @else if (error()) {
    <app-error-alert [message]="error()!" [retryable]="false" />
  } @else if (!loading() && capacitaciones().length === 0) {
    <app-empty-state
      title="Sin capacitaciones"
      message="No se encontraron capacitaciones registradas."
      icon="pi pi-book"
    />
  } @else {
    <div class="capacitaciones-grid">
      @for (cap of capacitaciones(); track cap.codigo_capacitacion_detalle_pk) {
        <app-capacitacion-card [capacitacion]="cap" (asistenciaConfirmada)="onAsistenciaConfirmada()" />
      }
    </div>
  }
</div>
