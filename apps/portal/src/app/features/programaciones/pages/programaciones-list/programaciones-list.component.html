<div class="page-container">
  <app-page-header title="Programaciones" subtitle="Programación mensual de turnos del empleado" />

  @if (loading()) {
    <app-loading-spinner message="Cargando programaciones..." />
  } @else {
    @if (programaciones().length === 0) {
      <app-empty-state
        title="Sin programación"
        [message]="'No tienes programación asignada para ' + nombreMesActual + '.'"
        icon="pi pi-calendar-times"
      />
    } @else {
      <app-programacion-table
        [programaciones]="programaciones()"
        [diasDelMes]="diasDelMes()"
        [mes]="mesActual"
        [anio]="anioActual"
        [diaActual]="diaActual"
        titulo="Este mes"
        [subtitulo]="nombreMesActual"
      />
    }

    @if (programacionesSiguiente().length === 0) {
      <app-empty-state
        title="Sin programación"
        [message]="'No tienes programación asignada para ' + nombreMesSiguiente + '.'"
        icon="pi pi-calendar-plus"
      />
    } @else {
      <app-programacion-table
        [programaciones]="programacionesSiguiente()"
        [diasDelMes]="diasDelMesSiguiente()"
        [mes]="mesSiguiente"
        [anio]="anioSiguiente"
        titulo="Próximo mes"
        [subtitulo]="nombreMesSiguiente"
      />
    }

    @if (turnos().length > 0) {
      <app-programaciones-legend [turnos]="turnos()" />
    }
  }
</div>
