<div class="formato-edit-page">
  @if (loading()) {
    <div class="page-header">
      <p-skeleton width="300px" height="2rem" />
      <p-skeleton width="200px" height="1rem" />
    </div>
    <p-skeleton width="100%" height="500px" />
  } @else if (formato()) {
    <!-- Cabecera -->
    <div class="page-header">
      <div class="page-header__info">
        <h1 class="page-title">
          <i class="pi pi-file-edit page-title__icon"></i>
          {{ formato()!.nombre }}
        </h1>
        <p class="page-subtitle">Editar contenido del formato</p>
      </div>
      <div class="page-header__actions">
        <p-button label="Cancelar" [text]="true" severity="secondary" (onClick)="cancel()" />
        <p-button label="Guardar" icon="pi pi-check" [loading]="saving()" (onClick)="save()" />
      </div>
    </div>

    <!-- Editor -->
    <div class="editor-card">
      <p-editor [(ngModel)]="contenido" [style]="{ height: '500px' }" />
    </div>

    <!-- Imágenes del formato -->
    <app-formato-imagen [codigoFormato]="formato()!.codigo_formato_pk" />
  }
</div>
